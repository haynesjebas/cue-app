<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cue — Progress</title>
  <meta name="description" content="Track your ritual momentum and habit streaks." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="stylesheet" href="/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .progress-hero {
      padding: 24px 20px 0;
    }

    @media (min-width: 768px) {
      .progress-hero { padding: 28px 32px 0; }
    }

    .progress-hero__month {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-primary);
    }

    @media (min-width: 768px) {
      .progress-hero__month { font-size: 56px; }
    }

    .progress-hero__sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
      font-style: italic;
    }

    /* Chart card */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .chart-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chart-week-filters {
      display: flex;
      gap: 4px;
    }

    .week-filter-btn {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color var(--t), background var(--t);
    }

    .week-filter-btn.active {
      color: var(--green);
      background: rgba(34, 197, 94, 0.1);
    }

    /* Live sync badge */
    .live-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
    }

    /* Ritual depth */
    .ritual-depth-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Observation card (amber on desktop right panel) */
    .observation-card {
      background: #1a1200;
      border: 1px solid rgba(212,160,23,0.3);
      border-radius: var(--radius);
      padding: 16px;
    }

    .observation-card__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .observation-card__text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* Right panel layout (desktop only) */
    @media (min-width: 768px) {
      .progress-right-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: sticky;
        top: 24px;
      }
    }

    .ritual-depth-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
  </style>
  <script src="/config.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- ── SIDEBAR (desktop) ─────────────────────────────── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">Cue</div>
      <div class="sidebar__brand-sub">The Ritual</div>
    </div>
    <div class="sidebar__nav">
      <a class="sidebar__item" href="/moments.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l1.8 5.4H20l-4.8 3.6 1.8 5.4L12 13l-5 3.4 1.8-5.4L4 7.4h6.2z"/></svg>
        Moments
      </a>
      <a class="sidebar__item" href="/habits.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Habits
      </a>
      <a class="sidebar__item active" href="/progress.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Progress
      </a>
      <a class="sidebar__item" href="/settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Me
      </a>
    </div>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar" id="sidebarAvatar">JD</div>
        <div>
          <div class="sidebar__user-name" id="sidebarName">Alex R.</div>
          <div class="sidebar__user-role">Pro Member</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ───────────────────────────────────── -->
  <div class="main-content">

    <!-- Mobile header -->
    <div class="page-header-mobile">
      <div style="font-size:20px;font-weight:800;color:var(--green);">Cue</div>
      <div class="flex gap-2 items-center">
        <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="avatar" id="mobileAvatar" style="width:32px;height:32px;font-size:12px;">JD</div>
      </div>
    </div>

    <!-- Hero -->
    <div class="progress-hero">
      <div class="progress-hero__month" id="progressMonth">January</div>
      <div class="progress-hero__sub">growth</div>
    </div>

    <!-- Desktop 2-col layout -->
    <div class="page-pad" style="padding-top:20px;">
      <div class="desktop-layout">

        <!-- LEFT: Stats + Chart + AI Insight -->
        <div style="display:flex;flex-direction:column;gap:16px;">

          <!-- Stat cards row -->
          <div class="grid-2">
            <div class="stat-card">
              <div class="stat-card__label">Avg Daily Activity</div>
              <div style="display:flex;align-items:baseline;gap:4px;">
                <div class="stat-card__value stat-card__value--green" id="statAvg">—</div>
                <div class="stat-card__change" id="statAvgChange"></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card__label">Best Streak</div>
              <div style="display:flex;align-items:baseline;gap:6px;">
                <div class="stat-card__value" id="statStreak">—</div>
                <div class="stat-card__sub">days</div>
              </div>
            </div>
          </div>

          <!-- Chart card -->
          <div class="chart-card">
            <div class="chart-card__header">
              <div class="chart-card__title">Daily Ritual Activity</div>
              <div style="display:flex;align-items:center;gap:12px;">
                <span class="live-badge" id="liveBadge" style="display:none;">Live sync</span>
                <div class="chart-week-filters" id="weekFilters">
                  <button class="week-filter-btn" data-week="1">W1</button>
                  <button class="week-filter-btn" data-week="2">W2</button>
                  <button class="week-filter-btn" data-week="3">W3</button>
                  <button class="week-filter-btn active" data-week="4">W4</button>
                </div>
              </div>
            </div>
            <div class="chart-container">
              <canvas id="activityChart"></canvas>
            </div>
          </div>

          <!-- AI Insight card -->
          <div class="ai-card" id="aiInsightCard" style="display:none;">
            <div class="ai-card__label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              AI Insights: Ritual Momentum
            </div>
            <div class="ai-card__text" id="aiInsightText">Analysing your patterns…</div>
          </div>

        </div>

        <!-- RIGHT: Ritual Depth + Observation (desktop right panel) -->
        <div class="progress-right-panel">

          <!-- Ritual depth -->
          <div class="card" style="padding:20px;">
            <div class="ritual-depth-header">
              <div class="section-label">Ritual Depth</div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
            </div>
            <div class="ritual-depth-list" id="ritualDepthList">
              <!-- populated by JS -->
            </div>
          </div>

          <!-- Observation card -->
          <div class="observation-card" id="observationCard" style="display:none;">
            <div class="observation-card__label">
              <span>💡</span> Observation
            </div>
            <div class="observation-card__text" id="observationText"></div>
            <button class="btn--amber" onclick="window.location.href='/habits.html'">
              Optimise Schedule
            </button>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- ── BOTTOM NAV (mobile) ────────────────────────────── -->
  <nav class="bottom-nav">
    <a class="bottom-nav__item" href="/moments.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l1.8 5.4H20l-4.8 3.6 1.8 5.4L12 13l-5 3.4 1.8-5.4L4 7.4h6.2z"/></svg>
      Moments
    </a>
    <a class="bottom-nav__item" href="/habits.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Habits
    </a>
    <a class="bottom-nav__item active" href="/progress.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Progress
    </a>
    <a class="bottom-nav__item" href="/settings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Me
    </a>
  </nav>

</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="/js/progress.js"></script>
</body>
</html>
